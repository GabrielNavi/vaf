# Plantilla de sub-instancia VAF.
# Copia a /etc/vaf/vaf.sub/NOMBRE/vaf.conf y ajusta los valores.
# La mayoría de opciones se heredan de /etc/vaf/vaf.conf si no se definen aquí.

# Clave de agregación para esta sub-instancia.
# Vacío: se usa el nombre de la sub-instancia (carpeta en vaf.sub/).
KEY=

# URL del VAS superior — OBLIGATORIO. Diferente para cada sub-instancia.
UPPER_VAS_HOST=
UPPER_VAS_SCHEME=http

# Filtro de clientes del VAS local para esta instancia.
# Heredado de /etc/vaf/vaf.conf si no se define.
# FILTER=active
# GLOBAL_KEY=
# LOCAL_KEY_LIST=
