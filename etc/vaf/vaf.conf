# Configuración de vaf (Vitalinux Autoregistration Federated)
# Modifica este fichero para ajustar el comportamiento sin reinstalar el paquete.
# Añade sobreescrituras en /etc/vaf/vaf.conf.d/*.conf
# (se aplican en orden lexical, después de este archivo).

# Clave de agregación. El inventario local se publica en el VAS superior como:
#   extra_imperative.VAF_<KEY> = {"clients": [...]}
# Debe ser única por nodo VAF en la federación.
# Ejemplo: KEY=aula3
KEY=

# URL del VAS local — fuente del inventario de clientes.
LOCAL_VAS_HOST=http://127.0.0.1:8000

# URL del VAS superior — destino del registro de este nodo VAF.
# Obligatorio. El nodo VAF se registra aquí como cliente con extra_imperative.VAF_<KEY>.
UPPER_VAS_HOST=

# Filtro de clientes consultados al VAS local:
#   active    → solo clientes activos (compatible con SOURCE=vac en VAS local)
#   inactive  → solo clientes inactivos
#   archived  → solo clientes archivados
#   all       → todos los clientes
FILTER=active

# Clave extra enviada al VAS local como ?extra_key=KEY.
# Solo descarga clientes del VAS local que tengan esa clave en sus extras.
# Vacío = inventario completo del VAS local.
# Útil para publicar en el VAS superior solo un subconjunto del inventario local.
GLOBAL_KEY=

# Segundos entre comprobaciones de versión del VAS local y heartbeat con el VAS superior
CHECK_SECONDS=300

# Segundos de espera ante errores de conexión
RETRY_SECONDS=60

# Sincronización del inventario del VAS superior.
# true  → vaf descarga /clients del VAS superior en /var/lib/vaf/upper_clients.json
#          tras cada cambio de versión. Permite a este nodo conocer el estado
#          agregado de toda la federación.
# false → solo mantiene el propio registro en el VAS superior (por defecto).
SYNC_UPPER=false

# Puerto UDP de escucha para notificaciones push del VAS local (como VAL-Aware).
# 0 = desactivado (solo polling periódico).
# Con valor distinto de 0, cualquier datagrama UDP interrumpe el sleep del ciclo
# y dispara una comprobación inmediata de la versión del VAS local.
# Requiere el hook local-vaf-register activo en /etc/vas/hooks.d/ del VAS local.
# Ejemplo: BUMP_LISTEN_PORT=9878
BUMP_LISTEN_PORT=0
