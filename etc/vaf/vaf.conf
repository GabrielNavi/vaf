# Configuración de vaf (Versatile Autoregistration Federated)
# Modifica este fichero para ajustar el comportamiento sin reinstalar el paquete.
# Añade sobreescrituras en /etc/vaf/vaf.conf.d/*.conf
# (se aplican en orden lexical, después de este archivo).

# Clave de agregación. El inventario local se publica en el VAS superior como:
#   extra_imperative.VAF_<KEY>_clients = {"clients": [...]}
# Debe ser única por nodo VAF en la federación.
# Vacío: se usa el hostname corto del equipo (hostname -s).
# Ejemplo: KEY=aula3
KEY=

# URL del VAS superior — destino del registro de este nodo VAF.
# Obligatorio. Formato: host:puerto (ej. 10.0.0.1:8000) o solo host (puerto 8000 implícito).
UPPER_VAS_HOST=

# Esquema de conexión al VAS superior.
UPPER_VAS_SCHEME=http

# Filtro de clientes consultados al VAS local:
#   active    → solo clientes activos
#   inactive  → solo clientes inactivos
#   archived  → solo clientes archivados
#   all       → todos los clientes
FILTER=active

# Clave extra enviada al VAS local como ?extra_key=KEY.
# Solo descarga clientes del VAS local que tengan esa clave en sus extras.
# Vacío = inventario completo del VAS local.
GLOBAL_KEY=

# Lista de claves extra a materializar como ficheros <KEY>_clients.json en STATE_DIR.
# Separadas por espacios. Vacío = sin materialización.
# Ejemplo: LOCAL_KEY_LIST=hardware so
LOCAL_KEY_LIST=

# Segundos entre comprobaciones de versión del VAS local y sincronización.
CHECK_SECONDS=300

# Intervalo entre señales de liveness (POST /heartbeat + extras informativos).
# Vacío o no definido: igual a CHECK_SECONDS.
# HEARTBEAT_SECONDS=300

# Segundos de espera ante errores de conexión.
RETRY_SECONDS=60

# Sincronización del inventario del VAS superior en upper_clients.json.
# Activar si el nodo necesita conocer el estado agregado de toda la federación.
SYNC_UPPER=false

# Hooks de consumo del inventario local (rol VAL).
# Directorio de hooks ejecutados cuando el VAS local cambia de versión.
# Reciben el inventario local por stdin (si DISPATCH_STDIN=true).
HOOKS_LOCAL_DIR=/etc/vaf/hooks_local.d
DISPATCH_STDIN=true
HOOK_TIMEOUT_SECONDS=30

# Extras hacia el VAS superior (rol VAC).
# Hooks en estos directorios producen JSON adicional que se añade al registro.
#   imperative  → claves que generan bump de versión en UPPER_VAS si cambian.
#   informative → claves puramente informativas, no generan bump.
EXTRAS_ENABLED=true
EXTRAS_TTL=86400
# EXTRAS_IMPERATIVE_HOOKS_DIR=/etc/vaf/extras_imperative.d
# EXTRAS_INFORMATIVE_HOOKS_DIR=/etc/vaf/extras_informative.d

# Paralelización de sub-instancias.
# both           → ejecuta instancia principal y sub-instancias (vaf-sub-manager).
# only_main      → solo instancia principal.
# only_parallel  → solo sub-instancias via vaf-sub-manager.
PARALLEL_MODE=both

# Transformación VAT del inventario antes de enviarlo al VAS superior.
# Requiere paquete versatile-autoreg-vat instalado.
# USE_VAT=false
# VAT_PRESET=

# Registro de log.
# LOG_LEVEL: no | normal | debug
# LOG_FILE:  vacío → solo stdout/journald; ruta → también fichero con timestamp UTC.
# LOG_LEVEL=normal
# LOG_FILE=
